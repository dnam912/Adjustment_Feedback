<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjustment Feedback</title>
    <link rel="stylesheet" href="./script.css">
</head>
<body>
    <h1>Hearing Readiness Monitor</h1>
    
    <div id="axis-labels"></div>
    <div id="btn-panel">
        <div id="ear-controls">
            <button id="btnLeft" class="active">Left</button>
            <button id="btnRight">Right</button>
            <button id="btnBoth">Both</button>
            <button id="btnMic" style="display: none">Real-time Mic</button>
        </div>
        <div id="wav-controls">
            <button id="btnLoadWav" style="display: none">Load WAV</button>
            <button id="btnPlayWav" style="display: none">Play WAV</button>
            <button id="btnStopWav" style="display: none">Stop WAV</button>

            <span id="wavFileName" style="display: none">No file</span>
            <span id="wavTime" style="display: none">0.00 / 0.00</span>
            <span id="wavAlert" style="display: none">No alert</span>

            <input type="file" id="wavInput" accept=".wav" hidden>
        </div>
    </div>
    

    <div id="controls">
        <button id="btnAudiogram" class="active">Audiogram</button>
        <button id="btnRealtime">Acoustic Monitor</button>
        <button id="btnWav">WAV Player</button>
        <button id="btnIntegration">Data Integration</button>
    </div>

    <div id="integration-panel" style="display: none;">
        <!-- IMPLEMENTATION -->
    </div>

    <div id="legend">
    <div id="leg-audiogram">
        <div class="leg-item"><span class="leg-swatch" style="background:#1a6ab0"></span> Left ear (dB HL)</div>
        <div class="leg-item"><span class="leg-swatch" style="background:#aa2222"></span> Right ear (dB HL)</div>
    </div>

    <div id="leg-realtime" style="display:none">
        <div class="leg-item"><span class="leg-swatch" style="background:#1a6ab0"></span> Mod Output L (dB SPL)</div>
        <div class="leg-item"><span class="leg-swatch" style="background:#aa2222"></span> Mod Output R (dB SPL)</div>
        <div class="leg-item"><span class="leg-swatch dashed" style="color:#0a2a4a"></span> MPO L (dB SPL)</div>
        <div class="leg-item"><span class="leg-swatch dashed" style="color:#440a0a"></span> MPO R (dB SPL)</div>
        <div class="leg-item"><span class="leg-swatch dashed" style="color:#2277bb"></span> Threshold L (dB SPL)</div>
        <div class="leg-item"><span class="leg-swatch dashed" style="color:#bb3333"></span> Threshold R (dB SPL)</div>
        <div class="leg-item"><span class="leg-swatch" style="background:#0055ff"></span> Mic (real-time)</div>
    </div>
    <!--<input type="file" accept=".json" onchange="loadPatientData(event)">-->

    <script type="module" src="./js/main.js"></script>
    
</body>
</html>
